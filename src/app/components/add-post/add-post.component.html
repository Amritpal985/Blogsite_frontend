<div id="parent" class="d-flex flex-column">
    <div class="container">
        <form [formGroup]="form">
            <div class="title mx-5 mt-5">
                <mat-form-field class="w-100">
                    <mat-label>Title</mat-label>
                    <input type="text" matInput formControlName="title">
                </mat-form-field>
            </div>
            <div class="content m-5">
                <div class="NgxEditor__Wrapper">
                    <ngx-editor-menu [editor]="editor"> </ngx-editor-menu>
                    <ngx-editor [editor]="editor" [disabled]="false" formControlName="content"></ngx-editor>
                </div>
            </div>
            <div class="tags mx-5">
                <mat-form-field class="w-100">
                    <mat-label>Tags</mat-label>
                    <mat-select multiple formControlName="tags">
                        <mat-option value="first">First</mat-option>
                        <mat-option value="second">second</mat-option>
                        <mat-option value="third">third</mat-option>
                        <mat-option value="fourth">fourth</mat-option>
                        <mat-option value="fifth">fifth</mat-option>
                        <mat-option value="sixth">sixth</mat-option>
                        <mat-option value="seventh">seventh</mat-option>
                        <mat-option value="eight">eight</mat-option>
                    </mat-select>
                </mat-form-field>
            </div>
            <button mat-raised-button (click)="savePost()" class="mx-5 mt-4">Post</button>
        </form>
    </div>
</div>
