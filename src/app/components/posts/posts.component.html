<div *ngIf="allPosts.length">
  <mat-card class="card" *ngFor="let post of allPosts">
    <mat-card-header>
      <mat-card-title> {{ post.title }} </mat-card-title>
    </mat-card-header>
    <img
      mat-card-image
      src="https://material.angular.dev/assets/img/examples/shiba2.jpg"
      alt="Photo of a Shiba Inu"
    />
    <mat-card-content>
      <p>{{ post.content }}</p>
    </mat-card-content>
    <mat-card-actions>
      <button mat-button>LIKE</button>
      <button mat-button>SHARE</button>
    </mat-card-actions>
  </mat-card>
</div>
