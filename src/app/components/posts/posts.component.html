<div id="parent d-flex">
  <div id="top" class="row">
    <div class="top-title col-5 p-5">Discover Stories, Ideas, and Inspiration from Every Angle</div>
    <div class="top-sub-title col-7 p-5">
      Your daily mix of thoughtful insights, tips,<br />
      and adventures—right here.
    </div>
  </div>
  <div id="content" class="mt-4 d-flex flex-column">
    <div class="filter-box d-flex">
      <div class="tags">
        <mat-form-field appearance="fill">
          <mat-label>Favorite food</mat-label>
          <mat-select>
            <mat-option value="pizza">Pizza</mat-option>
            <mat-option value="burger">Burger</mat-option>
            <mat-option value="sushi">Sushi</mat-option>
          </mat-select>
        </mat-form-field>
      </div>
      <div class="author-name mx-3">
        <mat-form-field class="example-full-width">
          <mat-label>Favorite food</mat-label>
          <input matInput placeholder="Ex. Pizza" value="Sushi" />
        </mat-form-field>
      </div>
      <div class="search-button">
        <button mat-raised-button>Search</button>
      </div>
    </div>
    <div class="posts" *ngIf="allPosts.length">
      <mat-card class="card my-4" *ngFor="let post of allPosts">
        <mat-card-header>
          <mat-card-title> {{ post.title }} </mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <p>{{ post.content }}</p>
        </mat-card-content>
        <mat-card-actions>
          <button mat-button>LIKE</button>
          <button mat-button>SHARE</button>
        </mat-card-actions>
      </mat-card>
    </div>
  </div>
</div>
